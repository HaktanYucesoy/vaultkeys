<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart — VaultKeys</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { brand: { DEFAULT: '#00E5A0', dark: '#00C88B' }, surface: { DEFAULT: '#080B10', card: '#0D1117', elevated: '#161B26', border: '#1C2333' } } } }
    }
  </script>
  <style>
    body { background: #080B10; font-family: 'DM Sans', sans-serif; animation: pageEnter .35s ease both; }
    @keyframes pageEnter { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    body.page-exit { animation: pageExit .2s ease forwards; }
    @keyframes pageExit { to { opacity: 0; transform: translateY(-4px); } }
    .font-display { font-family: 'Syne', sans-serif; }
    .btn-glow { box-shadow: 0 0 20px #00E5A025, 0 0 40px #00E5A010; transition: all 0.2s ease; }
    .btn-glow:hover { box-shadow: 0 0 30px #00E5A050, 0 0 60px #00E5A020; transform: translateY(-1px); }
    @keyframes itemRemove { to { opacity: 0; transform: translateX(-10px) scaleY(0.7); max-height: 0; padding-top: 0; padding-bottom: 0; margin-bottom: 0; border-width: 0; } }
    .item-removing { animation: itemRemove .28s ease forwards; overflow: hidden; pointer-events: none; }
    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: #080B10; } ::-webkit-scrollbar-thumb { background: #1C2333; border-radius: 3px; }
  </style>
</head>
<body class="text-gray-100 font-sans antialiased">

<nav class="sticky top-0 z-50 border-b border-surface-border bg-surface/95 backdrop-blur-xl">
  <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-14">
    <a href="index.html" class="flex items-center gap-2 font-extrabold text-lg tracking-tight">
      <svg class="w-7 h-7" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M14 3L24.1244 9V21L14 27L3.87564 21V9L14 3Z" stroke="#00E5A0" stroke-width="1.25" fill="rgba(0,229,160,0.08)"/><path d="M14 9L19.5 12.25V18.75L14 22L8.5 18.75V12.25L14 9Z" fill="#00E5A0" fill-opacity="0.45"/></svg>
      <span>Vault<span class="text-brand">Keys</span></span>
    </a>
    <div class="flex items-center gap-2 text-xs text-gray-600">
      <span class="text-gray-700">Checkout</span>
      <span>›</span>
      <span class="text-gray-700">Confirmation</span>
    </div>
    <div class="flex items-center gap-2">
      <a href="cart.html" class="relative flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-brand bg-brand/10 border border-brand/15 text-sm font-medium">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
        Cart
        <span id="cart-badge" class="hidden px-1.5 py-0.5 text-xs bg-brand text-black font-bold rounded-full leading-none"></span>
      </a>
    </div>
  </div>
</nav>

<div class="max-w-5xl mx-auto px-4 py-10">
  <h1 class="text-2xl font-bold mb-8">Shopping Cart</h1>

  <div class="grid md:grid-cols-3 gap-8">
    <div class="md:col-span-2" id="cart-items"></div>

    <div>
      <div class="sticky top-20 rounded-2xl bg-surface-card border border-surface-border overflow-hidden">
        <div class="p-5">
          <h2 class="font-bold mb-4">Order Summary</h2>

          <div class="mb-4">
            <label class="text-xs text-gray-500 block mb-1.5">Have a coupon?</label>
            <div class="flex gap-2">
              <input id="coupon-input" type="text" placeholder="e.g. DEALHUB10" class="flex-1 px-3 py-2 text-sm bg-surface-elevated border border-surface-border rounded-xl focus:outline-none focus:border-brand/40 text-gray-300 placeholder-gray-700"/>
              <button id="apply-coupon" class="px-3 py-2 text-xs bg-surface-elevated border border-surface-border rounded-xl hover:border-brand/30 transition font-semibold text-gray-300">Apply</button>
            </div>
            <p id="coupon-msg" class="text-xs mt-1.5 hidden"></p>
          </div>

          <div class="space-y-2 text-sm border-t border-surface-border pt-4 mb-4">
            <div class="flex justify-between text-gray-400"><span>Subtotal</span><span id="subtotal">$0.00</span></div>
            <div class="flex justify-between text-gray-400"><span>Delivery</span><span class="text-brand font-medium">Free ⚡</span></div>
            <div id="discount-row" class="hidden flex justify-between text-green-400 text-xs"><span id="discount-label">Coupon</span><span id="discount-amt">Applied</span></div>
          </div>

          <div class="flex justify-between font-bold text-base border-t border-surface-border pt-4 mb-5">
            <span>Total</span><span class="text-brand" id="total-price">$0.00</span>
          </div>

          <a href="checkout.html" id="checkout-btn" class="block w-full py-3.5 bg-brand text-black font-bold rounded-xl hover:bg-brand-dark text-sm text-center btn-glow">
            Proceed to Checkout →
          </a>

          <div class="mt-4 flex items-center justify-center gap-3 text-xs text-gray-600">
            <span>🔒 SSL Secure</span>
            <span>·</span>
            <span>💳 All cards accepted</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/tracking.js"></script>
<script>
  let appliedCoupon = null;

  function render() {
    const cart = VKCart.getCart();
    const container = document.getElementById('cart-items');

    if (!cart.length) {
      container.innerHTML = `
        <div class="text-center py-20 rounded-2xl bg-surface-card border border-surface-border">
          <div class="text-5xl mb-4">🛒</div>
          <h2 class="text-xl font-bold mb-2">Your cart is empty</h2>
          <p class="text-gray-500 text-sm mb-6">Browse our collection and find something you'll love!</p>
          <a href="games.html" class="inline-block px-6 py-2.5 bg-brand text-black font-bold rounded-xl hover:bg-brand-dark transition text-sm">Browse Games</a>
        </div>`;
      document.getElementById('checkout-btn').classList.add('opacity-40', 'pointer-events-none');
      updateTotals();
      return;
    }

    container.innerHTML = cart.map(item => `
      <div data-item-id="${item.id}" class="flex items-center gap-4 p-4 rounded-2xl bg-surface-card border border-surface-border mb-3 group">
        <div class="w-16 h-16 rounded-xl flex-shrink-0 overflow-hidden">
          <div class="w-full h-full bg-gradient-to-br ${item.color || 'from-gray-700 to-gray-900'} flex items-center justify-center text-2xl">🎮</div>
        </div>
        <div class="flex-1 min-w-0">
          <div class="font-semibold truncate">${item.title}</div>
          <div class="text-xs text-gray-500 mt-0.5 capitalize">${item.category} · PC Digital Key</div>
          <div class="text-brand font-bold mt-1">${formatPrice(item.price)}</div>
        </div>
        <div class="flex items-center gap-3 flex-shrink-0">
          <span class="text-xs text-gray-600 bg-surface-elevated px-2 py-1 rounded-lg">Qty: ${item.qty}</span>
          <button onclick="removeItem('${item.id}')" class="p-1.5 text-gray-600 hover:text-red-400 hover:bg-red-400/10 transition rounded-lg">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
      </div>`).join('');

    updateTotals();
  }

  function removeItem(id) {
    const el = document.querySelector(`[data-item-id="${id}"]`);
    if (el) {
      el.classList.add('item-removing');
      setTimeout(() => { VKCart.removeItem(id); render(); }, 280);
    } else {
      VKCart.removeItem(id); render();
    }
  }

  function updateTotals() {
    const subtotal = VKCart.getTotal();
    document.getElementById('subtotal').textContent = formatPrice(subtotal);
    document.getElementById('total-price').textContent = formatPrice(subtotal);
  }

  document.getElementById('apply-coupon').addEventListener('click', () => {
    const code = document.getElementById('coupon-input').value.trim().toUpperCase();
    const msg = document.getElementById('coupon-msg');
    if (!code) return;
    if (['DEALHUB10', 'SAVE10', 'SUMMER25', 'VAULTDEAL'].includes(code)) {
      appliedCoupon = code;
      localStorage.setItem('vk_coupon', code);
      msg.textContent = `✓ Coupon "${code}" applied!`;
      msg.className = 'text-xs mt-1.5 text-brand';
      msg.classList.remove('hidden');
      document.getElementById('discount-row').classList.remove('hidden');
      document.getElementById('discount-label').textContent = `Coupon: ${code}`;
    } else {
      msg.textContent = '✗ Invalid coupon code';
      msg.className = 'text-xs mt-1.5 text-red-400';
      msg.classList.remove('hidden');
    }
  });

  const utm = VKTracking.getUtm();
  if (utm.utm_source === 'dealshub') {
    document.getElementById('coupon-input').value = 'DEALHUB10';
    document.getElementById('coupon-input').classList.add('border-brand/20', 'text-brand');
  }

  render();

  document.addEventListener('click', e => {
    const a = e.target.closest('a[href]');
    if (!a) return;
    const href = a.getAttribute('href');
    if (!href || href.startsWith('#') || href.startsWith('http') || a.target === '_blank') return;
    e.preventDefault();
    document.body.classList.add('page-exit');
    setTimeout(() => { window.location.href = href; }, 180);
  });
</script>
</body>
</html>

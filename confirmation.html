<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Confirmed — VaultKeys</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { brand: { DEFAULT: '#00E5A0', dark: '#00C88B' }, surface: { DEFAULT: '#080B10', card: '#0D1117', elevated: '#161B26', border: '#1C2333' } } } }
    }
  </script>
  <style>
    body { background: #080B10; font-family: 'DM Sans', sans-serif; animation: pageEnter .35s ease both; }
    @keyframes pageEnter { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    body.page-exit { animation: pageExit .2s ease forwards; }
    @keyframes pageExit { to { opacity: 0; transform: translateY(-4px); } }
    .font-display { font-family: 'Syne', sans-serif; }
    @keyframes successPulse { 0%,100% { box-shadow: 0 0 0 0 #00E5A030; } 50% { box-shadow: 0 0 0 20px transparent; } }
    .success-ring { animation: successPulse 2.5s cubic-bezier(.4,0,.6,1) infinite; box-shadow: 0 0 60px #00E5A030, 0 0 120px #00E5A015; }
    @keyframes drawCheck { to { stroke-dashoffset: 0; } }
    .checkmark-path { stroke-dasharray: 28; stroke-dashoffset: 28; animation: drawCheck .55s cubic-bezier(.4,0,.2,1) .35s forwards; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp .5s ease both; }
    pre { white-space: pre-wrap; word-break: break-all; }
    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: #080B10; } ::-webkit-scrollbar-thumb { background: #1C2333; border-radius: 3px; }
  </style>
</head>
<body class="text-gray-100 font-sans antialiased">

<nav class="border-b border-surface-border bg-surface/95">
  <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-14">
    <a href="index.html" class="flex items-center gap-2 font-extrabold text-lg tracking-tight">
      <svg class="w-7 h-7" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M14 3L24.1244 9V21L14 27L3.87564 21V9L14 3Z" stroke="#00E5A0" stroke-width="1.25" fill="rgba(0,229,160,0.08)"/><path d="M14 9L19.5 12.25V18.75L14 22L8.5 18.75V12.25L14 9Z" fill="#00E5A0" fill-opacity="0.45"/></svg>
      <span>Vault<span class="text-brand">Keys</span></span>
    </a>
    <div class="text-xs text-gray-600 flex items-center gap-2">
      <span class="text-gray-700">Cart</span><span>›</span>
      <span class="text-gray-700">Checkout</span><span>›</span>
      <span class="text-brand font-semibold">Confirmed ✓</span>
    </div>
  </div>
</nav>

<div class="max-w-3xl mx-auto px-4 py-12">

  <!-- SUCCESS HEADER -->
  <div class="text-center mb-10 fade-up">
    <div class="relative inline-flex mb-6">
      <div class="absolute inset-0 rounded-full bg-brand/10 blur-2xl scale-150 pointer-events-none"></div>
      <div class="success-ring relative w-20 h-20 rounded-full bg-brand/10 border-2 border-brand flex items-center justify-center">
        <svg class="w-10 h-10 text-brand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path class="checkmark-path" d="M20 6L9 17l-5-5"/>
        </svg>
      </div>
    </div>
    <h1 class="font-display text-3xl font-extrabold mb-2">Order Confirmed!</h1>
    <p class="text-gray-400">Your game keys are on the way to your inbox.</p>
    <div class="mt-4 inline-block px-4 py-1.5 rounded-full bg-surface-elevated border border-surface-border text-sm font-mono text-brand" id="order-id-display"></div>
  </div>

  <!-- ORDER ITEMS -->
  <div class="rounded-2xl bg-surface-card border border-surface-border p-6 mb-5 fade-up" style="animation-delay:.1s">
    <h2 class="font-bold mb-4">Items Purchased</h2>
    <div id="order-items" class="space-y-3"></div>
    <div class="border-t border-surface-border mt-4 pt-4 flex justify-between font-bold">
      <span>Total Paid</span><span class="text-brand" id="order-total"></span>
    </div>
  </div>

  <!-- GAME KEYS -->
  <div class="rounded-2xl bg-surface-card border border-surface-border p-6 mb-5 fade-up" style="animation-delay:.15s">
    <h2 class="font-bold mb-4">🎮 Your Game Keys</h2>
    <div id="game-keys" class="space-y-3"></div>
    <p class="text-xs text-gray-600 mt-4">Keys are also sent to your email. Activate on Steam by entering the key in your library.</p>
  </div>

  <!-- ACTIONS -->
  <div class="flex gap-3 justify-center fade-up" style="animation-delay:.2s">
    <a href="index.html" class="px-6 py-3 bg-brand text-black font-bold rounded-xl hover:bg-brand-dark transition text-sm">
      Continue Shopping
    </a>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/tracking.js"></script>
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const orderId = urlParams.get('order_id');
  const method = urlParams.get('method') || ADPAIR_CONFIG.defaultTrackingMethod || 'pixel';
  const orderData = JSON.parse(localStorage.getItem('vk_last_order') || '{}');
  const clickId = VKTracking.getClickId();
  const utm = VKTracking.getUtm();

  document.getElementById('order-id-display').textContent = `Order #${orderId || orderData.orderId || 'VK-DEMO'}`;

  const methodLabels = { pixel: 'Pixel (1×1 img)', s2s_get: 'S2S GET', s2s_post: 'S2S POST' };

  const items = orderData.items || [];
  items.forEach(item => {
    document.getElementById('order-items').innerHTML += `
      <div class="flex justify-between text-sm">
        <div><span class="font-medium">${item.title}</span><span class="text-gray-500 ml-2">×${item.qty}</span></div>
        <span>${formatPrice(item.price * item.qty)}</span>
      </div>`;
  });
  document.getElementById('order-total').textContent = formatPrice(orderData.revenue || 0);


  items.forEach(item => {
    const fakeKey = Array.from({length:5}, () => Math.random().toString(36).substring(2,7).toUpperCase()).join('-');
    document.getElementById('game-keys').innerHTML += `
      <div class="flex items-center justify-between p-3 rounded-xl bg-surface-elevated border border-surface-border">
        <div>
          <div class="text-sm font-medium">${item.title}</div>
          <div class="text-xs text-gray-500">Steam Key</div>
        </div>
        <div class="font-mono text-xs text-brand bg-brand/5 border border-brand/15 px-3 py-1.5 rounded-lg select-all cursor-text">${fakeKey}</div>
      </div>`;
  });

  async function fireTracking() {
    if (!clickId) return;
    const payload = {
      clickId,
      orderId: orderId || orderData.orderId,
      revenue: orderData.revenue,
      currency: 'USD',
      customerStatus: orderData.customerStatus,
      couponCode: orderData.couponCode,
      productCategory: orderData.productCategory,
    };
    try {
      await VKTracking.fireConversion(payload, method);
    } catch (_) {}
  }

  document.addEventListener('DOMContentLoaded', async () => {
    await fireTracking();
    VKCart.clearCart();
    localStorage.removeItem('vk_coupon');
  });
</script>
</body>
</html>

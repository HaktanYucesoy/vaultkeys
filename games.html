<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Browse Games — VaultKeys</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { brand: { DEFAULT: '#00E5A0', dark: '#00C88B' }, surface: { DEFAULT: '#080B10', card: '#0D1117', elevated: '#161B26', border: '#1C2333' } } } }
    }
  </script>
  <style>
    body { background: #080B10; font-family: 'DM Sans', sans-serif; animation: pageEnter .35s ease both; }
    @keyframes pageEnter { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    body.page-exit { animation: pageExit .2s ease forwards; }
    @keyframes pageExit { to { opacity: 0; transform: translateY(-4px); } }
    .font-display { font-family: 'Syne', sans-serif; }
    .game-card { transition: all .25s ease; }
    .game-card:hover { transform: translateY(-4px); box-shadow: 0 16px 48px rgba(0,0,0,.5), 0 0 0 1px #00E5A025; }
    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: #080B10; } ::-webkit-scrollbar-thumb { background: #1C2333; border-radius: 3px; }
  </style>
</head>
<body class="text-gray-100 font-sans antialiased">

<nav class="sticky top-0 z-50 border-b border-surface-border bg-surface/95 backdrop-blur-xl">
  <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-14">
    <a href="index.html" class="flex items-center gap-2 font-extrabold text-lg tracking-tight">
      <svg class="w-7 h-7" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M14 3L24.1244 9V21L14 27L3.87564 21V9L14 3Z" stroke="#00E5A0" stroke-width="1.25" fill="rgba(0,229,160,0.08)"/><path d="M14 9L19.5 12.25V18.75L14 22L8.5 18.75V12.25L14 9Z" fill="#00E5A0" fill-opacity="0.45"/></svg>
      <span>Vault<span class="text-brand">Keys</span></span>
    </a>
    <div class="flex items-center gap-3">
      <div class="relative">
        <input id="search-input" type="text" placeholder="Search games..." class="w-48 md:w-64 px-3 py-2 pl-9 text-sm bg-surface-elevated border border-surface-border rounded-xl focus:outline-none focus:border-brand/40 text-gray-300 placeholder-gray-600"/>
        <svg class="absolute left-3 top-2.5 w-3.5 h-3.5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      </div>
      <a href="cart.html" class="relative flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-gray-400 hover:text-white hover:bg-surface-elevated transition text-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
        <span>Cart</span>
        <span id="cart-badge" class="hidden px-1.5 py-0.5 text-xs bg-brand text-black font-bold rounded-full leading-none"></span>
      </a>
    </div>
  </div>
</nav>

<div class="max-w-7xl mx-auto px-4 py-8">
  <div class="flex gap-8">

    <!-- SIDEBAR -->
    <aside class="hidden md:block w-52 flex-shrink-0">
      <div class="sticky top-20 space-y-6">
        <div>
          <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Categories</h3>
          <div id="category-list" class="space-y-1"></div>
        </div>
        <div>
          <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Sort By</h3>
          <select id="sort-select" class="w-full px-3 py-2 text-sm bg-surface-elevated border border-surface-border rounded-xl focus:outline-none focus:border-brand/40 text-gray-300">
            <option value="popular">Most Popular</option>
            <option value="price_asc">Price: Low to High</option>
            <option value="price_desc">Price: High to Low</option>
            <option value="discount">Biggest Discount</option>
            <option value="rating">Top Rated</option>
          </select>
        </div>
        <div class="rounded-xl bg-brand/5 border border-brand/10 p-4">
          <div class="text-xs font-semibold text-brand mb-1">📦 Bundle Deals</div>
          <div class="text-xs text-gray-400">Save more with our curated game bundles!</div>
          <a href="games.html?category=bundle" class="mt-3 block text-center text-xs py-1.5 bg-brand text-black font-bold rounded-lg hover:bg-brand-dark transition">View Bundles</a>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <div class="flex-1 min-w-0">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h1 id="page-title" class="text-2xl font-bold"></h1>
          <p id="result-count" class="text-sm text-gray-500 mt-0.5"></p>
        </div>
        <!-- Mobile sort -->
        <select id="sort-select-mobile" class="md:hidden px-3 py-2 text-sm bg-surface-elevated border border-surface-border rounded-xl text-gray-300">
          <option value="popular">Popular</option>
          <option value="price_asc">Price ↑</option>
          <option value="price_desc">Price ↓</option>
          <option value="discount">Discount</option>
          <option value="rating">Rating</option>
        </select>
      </div>

      <div id="games-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4"></div>
      <div id="no-results" class="hidden text-center py-20">
        <div class="text-4xl mb-4">🎮</div>
        <div class="text-gray-500">No games found for this search.</div>
      </div>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/tracking.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  let activeCategory = params.get('category') || 'all';
  let searchTerm = '';
  let sortBy = 'popular';

  const catList = document.getElementById('category-list');
  CATEGORIES.forEach(cat => {
    const active = cat.id === activeCategory;
    catList.innerHTML += `
      <a href="games.html?category=${cat.id}" class="flex items-center gap-2 px-3 py-2 rounded-xl text-sm transition ${active ? 'bg-brand/10 text-brand border border-brand/15 font-medium' : 'text-gray-400 hover:text-white hover:bg-surface-elevated'}">
        <span>${cat.icon}</span><span>${cat.label}</span>
      </a>`;
  });

  function getFiltered() {
    let list = getProductsByCategory(activeCategory);
    if (searchTerm) {
      const s = searchTerm.toLowerCase();
      list = list.filter(g => g.title.toLowerCase().includes(s) || g.tags.some(t => t.toLowerCase().includes(s)));
    }
    switch (sortBy) {
      case 'price_asc':  list = [...list].sort((a, b) => a.price - b.price); break;
      case 'price_desc': list = [...list].sort((a, b) => b.price - a.price); break;
      case 'discount':   list = [...list].sort((a, b) => b.discount - a.discount); break;
      case 'rating':     list = [...list].sort((a, b) => b.rating - a.rating); break;
      default:           list = [...list].sort((a, b) => b.reviews - a.reviews);
    }
    return list;
  }

  function render() {
    const games = getFiltered();
    const grid = document.getElementById('games-grid');
    const noRes = document.getElementById('no-results');
    const catObj = CATEGORIES.find(c => c.id === activeCategory);
    document.getElementById('page-title').textContent = catObj ? `${catObj.icon} ${catObj.label}` : '🎮 All Games';
    document.getElementById('result-count').textContent = `${games.length} title${games.length !== 1 ? 's' : ''} available`;
    if (!games.length) { grid.innerHTML = ''; noRes.classList.remove('hidden'); return; }
    noRes.classList.add('hidden');
    grid.innerHTML = games.map(g => `
      <a href="product.html?slug=${g.slug}" class="game-card group rounded-2xl overflow-hidden bg-surface-card border border-surface-border">
        <div class="relative h-44 overflow-hidden bg-gradient-to-br ${g.color}">
          <img src="${g.image}" alt="${g.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500 ease-out" loading="lazy"/>
          ${g.badge ? `<span class="absolute top-2.5 left-2.5 text-xs px-2 py-0.5 bg-brand text-black font-bold rounded-md z-10">${g.badge}</span>` : ''}
          ${g.discount > 0 ? `<span class="absolute top-2.5 right-2.5 text-xs px-2 py-0.5 bg-red-500/90 text-white font-bold rounded-md z-10">-${g.discount}%</span>` : ''}
          <div class="absolute bottom-0 inset-x-0 h-10 bg-gradient-to-t from-surface-card to-transparent"></div>
        </div>
        <div class="p-3">
          <div class="font-semibold text-sm leading-tight mb-1 group-hover:text-brand transition">${g.title}</div>
          <div class="text-xs text-gray-500 mb-2">${g.tags.slice(0,2).join(' · ')}</div>
          <div class="flex items-baseline gap-2">
            <span class="font-bold text-brand text-sm">${formatPrice(g.price)}</span>
            ${g.originalPrice > g.price ? `<span class="text-xs text-gray-600 line-through">${formatPrice(g.originalPrice)}</span>` : ''}
          </div>
          <div class="mt-1.5 flex items-center gap-1 text-xs text-gray-600">
            <span class="text-yellow-400">★</span> ${g.rating}
          </div>
        </div>
      </a>`).join('');
  }

  document.getElementById('search-input').addEventListener('input', e => { searchTerm = e.target.value; render(); });
  document.getElementById('sort-select').addEventListener('change', e => { sortBy = e.target.value; render(); });
  document.getElementById('sort-select-mobile').addEventListener('change', e => { sortBy = e.target.value; render(); });

  render();

  document.addEventListener('click', e => {
    const a = e.target.closest('a[href]');
    if (!a) return;
    const href = a.getAttribute('href');
    if (!href || href.startsWith('#') || href.startsWith('http') || a.target === '_blank') return;
    e.preventDefault();
    document.body.classList.add('page-exit');
    setTimeout(() => { window.location.href = href; }, 180);
  });
</script>
</body>
</html>
